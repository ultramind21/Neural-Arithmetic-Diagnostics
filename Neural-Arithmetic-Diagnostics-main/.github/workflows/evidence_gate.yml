name: evidence-gate

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evidence-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evidence:
    name: Evidence Gate (nad-repro-check)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        shell: bash
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -e .

      - name: Evidence gate (one-button)
        shell: bash
        run: |
          nad-repro-check --root .
